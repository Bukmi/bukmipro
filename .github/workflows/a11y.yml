name: Accessibility (WCAG 2.1 AA)

on:
  # Run weekly so regressions from dep updates are caught
  schedule:
    - cron: "0 8 * * 1" # Mondays 08:00 UTC
  # Allow manual runs from the Actions tab
  workflow_dispatch:
    inputs:
      base_url:
        description: "URL to test against (default: staging)"
        required: false
        default: "https://staging.bukmi.pro"

# Only allow one concurrent run per branch — cancel stale runs
concurrency:
  group: a11y-${{ github.ref }}
  cancel-in-progress: true

jobs:
  axe:
    name: axe-core — WCAG 2.1 AA
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Install Playwright browsers
        run: npx playwright install --with-deps chromium

      - name: Run axe accessibility tests
        run: npx playwright test tests/a11y/
        env:
          BASE_URL: ${{ github.event.inputs.base_url || 'https://staging.bukmi.pro' }}

      - name: Upload Playwright report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-a11y-report
          path: playwright-report/
          retention-days: 14
